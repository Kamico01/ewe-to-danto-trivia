<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Trivia - Host Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Bricolage Grotesque', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            font-variation-settings: "wdth" 100, "wght" 800;
            color: #FFD100;
            margin-bottom: 5px;
        }

        .status-panel {
            background: #222;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #333;
            margin-bottom: 20px;
        }

        .card-preview {
            background: #FFD100;
            color: #000;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-variation-settings: "wdth" 85, "wght" 600;
            font-size: 1.5rem;
            border: 4px solid #000;
            box-shadow: 4px 5px 0 #50C878;
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
            margin-bottom: 20px;
        }

        .card-preview.reveal-state {
            background: #111;
            color: #fff;
            border-color: #fff;
            box-shadow: 4px 5px 0 #FFD100;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        button {
            background: #fff;
            color: #000;
            border: 3px solid #000;
            padding: 15px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-variation-settings: "wdth" 100, "wght" 700;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #333;
        }

        .btn-reveal {
            grid-column: span 2;
            background: #50C878;
            color: #000;
        }

        .btn-reveal.active {
            background: #ff4757;
            color: #fff;
        }

        .tracker-text {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>HOST PANEL</h2>
    
    <div class="status-panel">
        <div id="live-url">Trivia Game Control Room</div>
        <div class="tracker-text" id="host-tracker">Slide: 0 / 0</div>
    </div>

    <div class="card-preview" id="preview-box">
        <div id="preview-text">Loading game database...</div>
    </div>

    <div class="control-grid">
        <button class="btn-reveal" id="reveal-btn" onclick="toggleReveal()">REVEAL ANSWER</button>
        <button onclick="moveSlide(-1)">◀ PREV</button>
        <button onclick="moveSlide(1)">NEXT ▶</button>
    </div>

    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Real-time Database Memory Bank
        let TRIVIA_BANK = [];
        let currentIdx = 0;
        let isRevealed = false;

        // Firebase Configuration Setup
        const firebaseConfig = {
          apiKey: "AIzaSyC8Xy9nHkLrSzpVZAyiA7mwjfXDK8B_W4U",
          authDomain: "ewe-to-danto.firebaseapp.com",
          projectId: "ewe-to-danto",
          storageBucket: "ewe-to-danto.firebasestorage.app",
          messagingSenderId: "838679266744",
          appId: "1:838679266744:web:599eb54657ba110258fb4d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("trivia_state");

        // Fetch local question file on boot
        async function initHostDatabase() {
            try {
                const response = await fetch('./questions.json');
                const data = await response.json();
                
                // Construct structural tracking bounds
                TRIVIA_BANK = [{"q": "Waiting for host...", "a": "N/A"}];
                TRIVIA_BANK.push(...data);
                TRIVIA_BANK.push({"q": "Thank you for participating!", "a": "N/A"});
                
                // Hook live listener after structural construction complete
                syncWithDatabase();
            } catch (error) {
                document.getElementById('preview-text').innerText = "Failed to load questions.json";
                console.error("Database fetch breakdown:", error);
            }
        }

        // Active State Listener
        function syncWithDatabase() {
            db.on("value", (snapshot) => {
                const state = snapshot.val();
                if (!state) {
                    // Set default cloud root state if null
                    updateCloudState(0, false);
                    return;
                }

                currentIdx = state.current_index;
                isRevealed = state.show_answer;

                renderHostUI();
            });
        }

        // Render host UI elements cleanly
        function renderHostUI() {
            const previewBox = document.getElementById('preview-box');
            const previewText = document.getElementById('preview-text');
            const revealBtn = document.getElementById('reveal-btn');
            const tracker = document.getElementById('host-tracker');

            const currentCard = TRIVIA_BANK[currentIdx] || { "q": "End of Data Stream", "a": "N/A" };

            tracker.innerText = `Slide: ${currentIdx} / ${TRIVIA_BANK.length - 1}`;

            if (isRevealed && currentIdx > 0 && currentIdx < TRIVIA_BANK.length - 1) {
                previewBox.classList.add('reveal-state');
                previewText.innerText = `ANSWER:\n${currentCard.a}`;
                revealBtn.innerText = "HIDE ANSWER";
                revealBtn.classList.add('active');
            } else {
                previewBox.classList.remove('reveal-state');
                previewText.innerText = `QUESTION:\n${currentCard.q}`;
                revealBtn.innerText = "REVEAL ANSWER";
                revealBtn.classList.remove('active');
            }
        }

        // Fire transaction update states to the cloud database
        function updateCloudState(index, reveal) {
            db.set({
                current_index: index,
                show_answer: reveal,
                timestamp: Date.now()
            });
        }

        // Action controllers
        function moveSlide(direction) {
            let targetIdx = currentIdx + direction;
            if (targetIdx >= 0 && targetIdx < TRIVIA_BANK.length) {
                updateCloudState(targetIdx, false);
            }
        }

        function toggleReveal() {
            if (currentIdx === 0 || currentIdx === TRIVIA_BANK.length - 1) return; // Ignore on intro/outro slides
            updateCloudState(currentIdx, !isRevealed);
        }

        // Run boot pipeline sequence
        initHostDatabase();
    </script>
</body>
</html>
